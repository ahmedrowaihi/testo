<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">AWS Live Streaming Architecture</text>

  <!-- OBS / Source -->
  <rect x="30" y="100" width="120" height="80" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">OBS Studio</text>
  <text x="90" y="155" text-anchor="middle" fill="#93c5fd" font-size="10">RTMP Source</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="140" x2="200" y2="140" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="175" y="130" text-anchor="middle" fill="#9ca3af" font-size="9">RTMP</text>

  <!-- MediaLive -->
  <rect x="210" y="80" width="140" height="120" rx="8" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="280" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">AWS</text>
  <text x="280" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">MediaLive</text>
  <text x="280" y="160" text-anchor="middle" fill="#fdba74" font-size="10">Encoder</text>
  <text x="280" y="175" text-anchor="middle" fill="#fdba74" font-size="10">HLS / DASH</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="140" x2="400" y2="140" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="375" y="130" text-anchor="middle" fill="#9ca3af" font-size="9">HLS</text>

  <!-- MediaPackage -->
  <rect x="410" y="80" width="140" height="120" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="480" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">AWS</text>
  <text x="480" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">MediaPackage</text>
  <text x="480" y="160" text-anchor="middle" fill="#86efac" font-size="10">Origin / DRM</text>
  <text x="480" y="175" text-anchor="middle" fill="#86efac" font-size="10">Packaging</text>

  <!-- Arrow 3 -->
  <line x1="550" y1="140" x2="600" y2="140" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CloudFront -->
  <rect x="610" y="80" width="140" height="120" rx="8" fill="#581c87" stroke="#a855f7" stroke-width="1.5"/>
  <text x="680" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Amazon</text>
  <text x="680" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">CloudFront</text>
  <text x="680" y="160" text-anchor="middle" fill="#d8b4fe" font-size="10">CDN</text>
  <text x="680" y="175" text-anchor="middle" fill="#d8b4fe" font-size="10">Edge Caching</text>

  <!-- Arrow 4 -->
  <line x1="750" y1="140" x2="780" y2="140" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Viewers -->
  <rect x="790" y="70" width="90" height="50" rx="8" fill="#164e63" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="835" y="92" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Web</text>
  <text x="835" y="106" text-anchor="middle" fill="#67e8f9" font-size="9">HLS.js</text>

  <rect x="790" y="130" width="90" height="50" rx="8" fill="#164e63" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="835" y="152" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Mobile</text>
  <text x="835" y="166" text-anchor="middle" fill="#67e8f9" font-size="9">ExoPlayer</text>

  <rect x="790" y="190" width="90" height="50" rx="8" fill="#164e63" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="835" y="212" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Smart TV</text>
  <text x="835" y="226" text-anchor="middle" fill="#67e8f9" font-size="9">Native</text>

  <!-- CloudWatch -->
  <rect x="310" y="240" width="140" height="50" rx="8" fill="#422006" stroke="#eab308" stroke-width="1.5"/>
  <text x="380" y="262" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">CloudWatch</text>
  <text x="380" y="278" text-anchor="middle" fill="#fde047" font-size="10">Monitoring</text>

  <!-- S3 -->
  <rect x="500" y="240" width="140" height="50" rx="8" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="570" y="262" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Amazon S3</text>
  <text x="570" y="278" text-anchor="middle" fill="#86efac" font-size="10">VOD Archive</text>

  <!-- Dashed lines to monitoring -->
  <line x1="280" y1="200" x2="350" y2="240" stroke="#6B7280" stroke-width="1" stroke-dasharray="4"/>
  <line x1="480" y1="200" x2="420" y2="240" stroke="#6B7280" stroke-width="1" stroke-dasharray="4"/>
  <line x1="480" y1="200" x2="540" y2="240" stroke="#6B7280" stroke-width="1" stroke-dasharray="4"/>
</svg>