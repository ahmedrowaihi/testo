<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="700" height="300" rx="12" fill="url(#bg3)"/>

  <text x="350" y="30" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">CloudFront CDN Distribution</text>

  <!-- Origin -->
  <rect x="30" y="110" width="130" height="80" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="95" y="145" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">MediaPackage</text>
  <text x="95" y="165" text-anchor="middle" fill="#86efac" font-size="10">Origin</text>

  <line x1="160" y1="150" x2="210" y2="150" stroke="#a855f7" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- CloudFront -->
  <rect x="220" y="70" width="200" height="160" rx="8" fill="#581c87" stroke="#a855f7" stroke-width="1.5"/>
  <text x="320" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">CloudFront</text>
  <text x="320" y="125" text-anchor="middle" fill="#d8b4fe" font-size="10">Edge Locations: 400+</text>
  <text x="320" y="145" text-anchor="middle" fill="#d8b4fe" font-size="10">Cache TTL: 1-6s</text>
  <text x="320" y="165" text-anchor="middle" fill="#d8b4fe" font-size="10">Origin Shield: ON</text>
  <text x="320" y="185" text-anchor="middle" fill="#d8b4fe" font-size="10">HTTP/3: Enabled</text>
  <text x="320" y="205" text-anchor="middle" fill="#d8b4fe" font-size="10">Signed URLs: Optional</text>

  <!-- Edge locations -->
  <line x1="420" y1="100" x2="490" y2="70" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="420" y1="130" x2="490" y2="120" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="420" y1="160" x2="490" y2="160" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="420" y1="190" x2="490" y2="200" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="420" y1="210" x2="490" y2="240" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr3)"/>

  <rect x="500" y="50" width="170" height="36" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="585" y="66" text-anchor="middle" fill="#e2e8f0" font-size="11">North America</text>
  <text x="585" y="80" text-anchor="middle" fill="#94a3b8" font-size="9">~90 Edge Locations</text>

  <rect x="500" y="100" width="170" height="36" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="585" y="116" text-anchor="middle" fill="#e2e8f0" font-size="11">Europe</text>
  <text x="585" y="130" text-anchor="middle" fill="#94a3b8" font-size="9">~85 Edge Locations</text>

  <rect x="500" y="145" width="170" height="36" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="585" y="161" text-anchor="middle" fill="#e2e8f0" font-size="11">Asia Pacific</text>
  <text x="585" y="175" text-anchor="middle" fill="#94a3b8" font-size="9">~75 Edge Locations</text>

  <rect x="500" y="190" width="170" height="36" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="585" y="206" text-anchor="middle" fill="#e2e8f0" font-size="11">Middle East & Africa</text>
  <text x="585" y="220" text-anchor="middle" fill="#94a3b8" font-size="9">~30 Edge Locations</text>

  <rect x="500" y="235" width="170" height="36" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="585" y="251" text-anchor="middle" fill="#e2e8f0" font-size="11">South America</text>
  <text x="585" y="265" text-anchor="middle" fill="#94a3b8" font-size="9">~20 Edge Locations</text>
</svg>